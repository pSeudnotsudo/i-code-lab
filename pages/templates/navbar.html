<!-- navbar.html - Django Template Component -->
{% load static %}

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo"><img src="{% static 'images/i-code_logo_v2.png' %}" alt="I-CODE Logo" style="top: auto; height: 50px;width: 120px;" /></a>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'programs' %}">Programs</a></li>
            <li><a href="{% url 'pricing' %}">Pricing</a></li>
            <li><a href="{% url 'about' %}">About Us</a></li>
        </ul>
        <div class="nav-auth">
            {% if user.is_authenticated %}
                <span class="nav-greeting">Hi, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn-signup">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn-login">Login</a>
                <a href="{% url 'register' %}" class="btn-signup">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>
