<!-- navbar.html - Django Template Component -->
{% load static %}

<nav class="icode-navbar">
    <div class="icode-nav-container">
        <a href="/" class="logo">I-CODE</a>
        <ul class="icode-nav-links">
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'courses' %}">Programs</a></li>
            {% comment %} <li><a href="{% url 'membership' %}">Membership</a></li> {% endcomment %}
            <li><a href="{% url 'services' %}">Services</a></li>
            <li><a href="{% url 'about' %}">About Us</a></li>
        </ul>
        {% comment %} <div class="nav-auth">
            <a href="{% url 'login' %}" class="btn-login">Login</a>
            <a href="{% url 'register' %}" class="btn-signup">Sign Up</a>
        </div> {% endcomment %}
    </div>
</nav>
