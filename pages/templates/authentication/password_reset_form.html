{% extends 'base.html' %}
{% block content %}

<style>
  .pr-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4f4;
    padding: 40px 16px;
    font-family: 'Segoe UI', sans-serif;
  }
  .pr-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.11);
    padding: 44px 40px 36px;
    width: 440px;
    max-width: 100%;
  }
  .pr-icon {
    width: 60px; height: 60px;
    background: #e8f7f7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .pr-icon svg { color: #3ecfcf; }
  .pr-card h2 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 8px;
  }
  .pr-card p {
    text-align: center;
    font-size: 0.85rem;
    color: #777;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #d9e8e8;
    border-radius: 10px;
    font-size: 0.85rem;
    color: #333;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus {
    border-color: #3ecfcf;
    box-shadow: 0 0 0 3px rgba(62,207,207,0.15);
  }
  .form-group input::placeholder { color: #bbb; }
  .btn-pr {
    width: 100%;
    padding: 12px;
    background: #3ecfcf;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(62,207,207,0.4);
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-pr:hover { background: #2ab5b5; transform: translateY(-1px); }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 0.83rem;
    color: #3ecfcf;
    text-decoration: none;
    font-weight: 500;
  }
  .back-link:hover { text-decoration: underline; }
</style>

<div class="pr-wrapper">
  <div class="pr-card">

    <div class="pr-icon">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>

    <h2>Forgot Password?</h2>
    <p>No worries! Enter your email address below and we'll send you a link to reset your password.</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email Address</label>
        <input type="email" name="email" id="id_email"
               placeholder="Enter your email address" required
               value="{{ form.email.value|default:'' }}">
        {% if form.email.errors %}
          <small style="color:red;">{{ form.email.errors|join:", " }}</small>
        {% endif %}
      </div>
      <button type="submit" class="btn-pr">Send Reset Link</button>
    </form>

    <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
  </div>
</div>

{% endblock %}
