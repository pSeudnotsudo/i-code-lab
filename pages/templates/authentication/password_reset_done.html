{% extends 'base.html' %}
{% block content %}

<style>
  .pr-wrapper {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #f0f4f4;
    padding: 40px 16px;
    font-family: 'Segoe UI', sans-serif;
  }
  .pr-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.11);
    padding: 44px 40px 36px;
    width: 440px;
    max-width: 100%;
    text-align: center;
  }
  .pr-icon {
    width: 70px; height: 70px;
    background: #e8f7f7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .pr-icon svg { color: #3ecfcf; }
  .pr-card h2 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 12px;
  }
  .pr-card p {
    font-size: 0.85rem;
    color: #777;
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .pr-card p strong { color: #333; }
  .tip-box {
    background: #f0f4f4;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.8rem;
    color: #666;
    margin: 20px 0 28px;
    text-align: left;
    line-height: 1.6;
  }
  .tip-box span { font-weight: 600; color: #3ecfcf; }
  .btn-pr {
    display: inline-block;
    padding: 11px 32px;
    background: #3ecfcf;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(62,207,207,0.4);
    transition: background 0.2s, transform 0.1s;
  }
  .btn-pr:hover { background: #2ab5b5; transform: translateY(-1px); }
  .back-link {
    display: block;
    margin-top: 18px;
    font-size: 0.83rem;
    color: #3ecfcf;
    text-decoration: none;
    font-weight: 500;
  }
  .back-link:hover { text-decoration: underline; }
</style>

<div class="pr-wrapper">
  <div class="pr-card">

    <div class="pr-icon">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h2>Check Your Email</h2>
    <p>We've sent a password reset link to your email address.<br>
       <strong>Please check your inbox.</strong>
    </p>

    <div class="tip-box">
      <span>💡 Tip:</span> If you don't see the email in your inbox, check your
      <strong>Spam</strong> or <strong>Junk</strong> folder. The link expires in
      <strong>3 days</strong>.
    </div>

    <a href="{% url 'password_reset' %}" class="btn-pr">Resend Email</a>
    <a href="{% url 'login' %}" class="back-link">← Back to Login</a>

  </div>
</div>

{% endblock %}
