{% extends 'base.html' %}
{% block content %}

<style>
  .pr-wrapper {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #f0f4f4;
    padding: 40px 16px;
    font-family: 'Segoe UI', sans-serif;
  }
  .pr-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.11);
    padding: 48px 40px 40px;
    width: 440px;
    max-width: 100%;
    text-align: center;
  }
  .pr-icon {
    width: 72px; height: 72px;
    background: #e8f7f7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
  }
  .pr-icon svg { color: #3ecfcf; }
  .pr-card h2 {
    font-size: 1.35rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 12px;
  }
  .pr-card p {
    font-size: 0.85rem;
    color: #777;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .btn-pr {
    display: inline-block;
    padding: 12px 40px;
    background: #3ecfcf;
    color: #fff;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(62,207,207,0.4);
    transition: background 0.2s, transform 0.1s;
  }
  .btn-pr:hover { background: #2ab5b5; transform: translateY(-1px); }
</style>

<div class="pr-wrapper">
  <div class="pr-card">

    <div class="pr-icon">
      <svg width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h2>Password Reset!</h2>
    <p>Your password has been successfully reset.<br>
       You can now log in with your new password.</p>

    <a href="{% url 'login' %}" class="btn-pr">Go to Login</a>

  </div>
</div>

{% endblock %}
